<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskFlow Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
    <style>
        .login-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .login-footer a { color: var(--teal); font-weight: 600; transition: color var(--trans); }
        .login-footer a:hover { color: var(--teal-dark); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon"><i data-lucide="check-square"></i></div>
                <h1>TaskFlow Pro</h1>
                <p>Sign in to your account</p>
            </div>
            <form id="login-form" class="login-form">
                <div id="login-error" class="login-error hidden"></div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username" autofocus placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
            
            <div class="login-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // If already logged in, redirect
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorEl.classList.add('hidden');
            btn.innerHTML = '<span>Signing in...</span><i data-lucide="loader-2" class="spin"></i>';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const API_URL = "/api/auth/login";
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    throw new Error(res.status === 401 ? 'Invalid username or password' : 'Login failed');
                }

                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);
                localStorage.setItem('userId', data.userId);
                
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.innerHTML = '<span>Sign In</span><i data-lucide="arrow-right"></i>';
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
