<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat — TaskFlow Pro</title>
    <meta name="description" content="Collaborate with your team in real-time group chats.">
    <link rel="stylesheet" href="chat.css">
</head>
<body>

<div class="chat-shell">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="chat-sidebar">
        <div class="sidebar-header">
            <h1>💬 Group Chat</h1>
            <a href="index.html" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Back
            </a>
        </div>
        <div class="group-list" id="group-list">
            <div style="padding:16px 18px; color:#4a5568; font-size:0.8rem;">Loading groups…</div>
        </div>
    </aside>

    <!-- ═══ MAIN AREA ═══ -->
    <div class="chat-main" id="chat-main">

        <!-- Default: no group selected -->
        <div class="no-group-selected" id="no-group-pane">
            <div class="big-icon">💬</div>
            <p>Select a group to start chatting</p>
        </div>

        <!-- Active chat (hidden until group is selected) -->
        <div id="active-chat-pane" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div class="chat-header" id="chat-header">
                <div class="chat-header-avatar" id="hdr-avatar">?</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="hdr-name">—</div>
                    <div class="chat-header-sub"  id="hdr-sub">—</div>
                </div>
                <div class="online-dot" title="Live"></div>
            </div>

            <div class="messages-area" id="messages-area">
                <div class="empty-chat" id="empty-chat-msg">
                    <div class="empty-chat-icon">🗨️</div>
                    <p>No messages yet. Say hello!</p>
                </div>
            </div>

            <div class="chat-input-bar">
                <div class="chat-input-wrap">
                    <input type="text" id="msg-input" placeholder="Type a message…" autocomplete="off" maxlength="2000">
                </div>
                <button class="send-btn" id="send-btn" aria-label="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>

    </div>
</div>

<script src="chat.js"></script>
</body>
</html>
