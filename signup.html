<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TaskFlow Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
    <style>
        .login-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .login-footer a { color: var(--teal); font-weight: 600; transition: color var(--trans); }
        .login-footer a:hover { color: var(--teal-dark); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon"><i data-lucide="check-square"></i></div>
                <h1>Create Account</h1>
                <p>Join your team on TaskFlow Pro</p>
            </div>
            <form id="signup-form" class="login-form">
                <div id="signup-error" class="login-error hidden"></div>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required autocomplete="name" autofocus placeholder="Your full name">
                </div>
                
                <div class="form-group">
                    <label for="employee-id">Employee ID <span style="font-weight:400;color:var(--text-light);">(optional)</span></label>
                    <input type="text" id="employee-id" autocomplete="off" placeholder="e.g. EMP-001">
                </div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username" placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="new-password" placeholder="Create a strong password">
                </div>
                
                <button type="submit" class="btn-primary" id="signup-btn">
                    <span>Sign Up</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
            
            <div class="login-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // If already logged in, redirect
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const errorEl = document.getElementById('signup-error');
            
            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const employeeId = document.getElementById('employee-id').value.trim();

            errorEl.classList.add('hidden');
            btn.innerHTML = '<span>Creating Account...</span><i data-lucide="loader-2" class="spin"></i>';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const API_URL = "/api/auth/signup";
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password, employeeId })
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.error || 'Failed to create account. Username might be taken.');
                }

                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);
                localStorage.setItem('userId', data.userId);
                
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.innerHTML = '<span>Sign Up</span><i data-lucide="arrow-right"></i>';
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
